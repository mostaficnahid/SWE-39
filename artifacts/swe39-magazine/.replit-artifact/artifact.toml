kind = "web"
previewPath = "/"
title = "SWE-39 Graduation Magazine"
version = "1.0.0"
id = "artifacts/swe39-magazine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21985

[services.development]
run = "pnpm --filter @workspace/swe39-magazine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swe39-magazine", "run", "build" ]
publicDir = "artifacts/swe39-magazine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21985"
BASE_PATH = "/"
